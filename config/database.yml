# config/database.yml 

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: postgres
  host: localhost
  port: 5433

development:
  <<: *default
  database: staffing_portal_development

test:
  <<: *default
  database: staffing_portal_test

staging:
  <<: *default
  database: ENV["DATABASE_URL"]

production:
  <<: *default
  database: ENV["DATABASE_URL"]
