name: Deploy Fund Forge Backend to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  RENDER_SERVICE_ID: srv-d5b88h63jp1c73d3fu60

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_API_KEY != '' }}

    steps:
      - name: Trigger deploy via Render API
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --url "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header "Content-Type: application/json" \
            --data '{"clearCache":"do_not_clear"}'

  missing-render-secret:
    name: Missing Render Secret
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_API_KEY == '' }}

    steps:
      - name: Explain missing Render API key
        run: |
          echo "RENDER_API_KEY is not configured for this repository."
          echo "Add the Render API key to GitHub Actions secrets before relying on workflow-driven backend deploys."
          echo "If Render GitHub auto-deploy is already connected directly in Render, this warning can be ignored."
